name: Assessments CI

on:
  pull_request:
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/assessments
      DEPLOY_ENVIRONMENT: staging
      FRONTEND_URL: https://assessments.savians.com
      ASSESSMENT_SECRET_NAME: savians/assessment/ci
      AWS_REGION: us-east-1
      VPC_ID: vpc-00000000000000000
      PVT_SUBNET1: subnet-00000000000000001
      PVT_SUBNET2: subnet-00000000000000002
      LAMBDA_SG: sg-00000000000000000
      COGNITO_USER_POOL_ID: us-east-1_000000000
      S3_DOCUMENTS_BUCKET: savians-assessment-ci-placeholder
      KMS_KEY_ID: 00000000-0000-0000-0000-000000000000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run prisma:validate
      - run: npm run prisma:generate
      - run: npm run cdk:synth

